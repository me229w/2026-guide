<!-- スライドドロワーメニュー -->

<script>
document.addEventListener('DOMContentLoaded', () => {
    const hamburgerBtn = document.querySelector('.hamburger-menu');
    const drawerMenu = document.querySelector('.drawer-menu');
    const drawerCloseBtn = document.querySelector('.drawer-close');
    const drawerOverlay = document.querySelector('.drawer-overlay');
    const drawerLinks = document.querySelectorAll('.drawer-nav-list a');

    // メニューを開く関数
    const openMenu = () => {
        drawerMenu.classList.add('is-active');
        drawerOverlay.classList.add('is-active');
        document.body.style.overflow = 'hidden'; // 背景スクロール固定
    };

    // メニューを閉じる関数
    const closeMenu = () => {
        drawerMenu.classList.remove('is-active');
        drawerOverlay.classList.remove('is-active');
        document.body.style.overflow = ''; // スクロール解除
    };

    // イベント設定
    hamburgerBtn.addEventListener('click', openMenu);
    drawerCloseBtn.addEventListener('click', closeMenu);
    drawerOverlay.addEventListener('click', closeMenu);

    // リンクをクリックした際も自動で閉じる
    drawerLinks.forEach(link => {
        link.addEventListener('click', closeMenu);
    });
});
</script>
  </body>
